name: Build privacy-conf .deb for ARM64

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential dpkg-dev fakeroot

      - name: Fix permissions
        run: |
          chmod 0755 DEBIAN/postinst

      - name: Clean package tree
        run: |
          rm -f README.md
          rm -rf .git
          rm -rf .github

      - name: Build .deb package
        run: |
          dpkg-deb --build . privacy-conf_${GITHUB_REF_NAME}_all.deb
          ls -lh privacy-conf_${GITHUB_REF_NAME}_all.deb

      - name: Upload .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: privacy-conf_${{ github.ref_name }}_all.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
